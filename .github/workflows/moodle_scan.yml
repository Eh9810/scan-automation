name: Moodle Scan Hourly

on:
  schedule:
    - cron: "0 * * * *"   # כל שעה עגולה (UTC)
  workflow_dispatch:       # מאפשר להריץ ידנית

permissions:
  contents: write          # כדי לעדכן last_run.json ולבצע commit

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and Virtual Display (Xvfb)
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests beautifulsoup4
          pip install undetected-chromedriver || echo "undetected-chromedriver not available – stealth mode disabled"

      - name: Restore Moodle session cache
        # run_id makes the key unique so the cache is always saved after each run.
        # restore-keys finds the most recent saved cache via prefix match.
        uses: actions/cache@v4
        with:
          path: moodle_cookies.json
          key: moodle-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            moodle-session-${{ runner.os }}-

      - name: Run scanner with Virtual Display
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_USER_ID: ${{ secrets.MOODLE_USER_ID }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Cookie injection: pre-exported cookies from a local authenticated session.
          # Produced by export_cookies.py (run locally after debug_browser_capture.py).
          # Includes F5 BIG-IP TS* trust tokens that bypass the WAF bot-score block.
          # Optional – leave unset to rely on SAML/Selenium login instead.
          MOODLE_INJECTED_COOKIES: ${{ secrets.MOODLE_INJECTED_COOKIES }}
          # Optional residential proxy to lower the F5 WAF bot score.
          # Example: "http://user:pass@proxy.example.com:8080"
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # xvfb-run גורם לדפדפן לחשוב שיש מסך אמיתי, מה שעוקף זיהוי של בוטים
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python moodle_scan.py

      - name: Commit updated state (last_run.json) if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "last_run.json"; then
            git add last_run.json
            git commit -m "Auto-update last_run.json"
            git push
          else
            echo "No changes to commit."
          fi
