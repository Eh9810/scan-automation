name: Moodle Scan Hourly

on:
  schedule:
    - cron: "0 * * * *"   # כל שעה עגולה (UTC)
  workflow_dispatch:       # מאפשר להריץ ידנית

permissions:
  contents: write          # כדי לעדכן last_run.json ולבצע commit

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and Virtual Display (Xvfb)
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests beautifulsoup4 undetected-chromedriver
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Ensure Xvfb is available
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scanner
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_USER_ID: ${{ secrets.MOODLE_USER_ID }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MOODLE_HEADLESS: "false"
          MOODLE_COOKIE_SEED_B64: ${{ secrets.MOODLE_COOKIE_SEED_B64 }}
        run: |
          xvfb-run -a python moodle_scan.py

      - name: Upload login debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moodle-login-debug
          path: |
            login_debug_page.html
            last_run.json
          if-no-files-found: ignore

      - name: Commit updated state (last_run.json) if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "last_run.json"; then
            git add last_run.json
            git commit -m "Auto-update last_run.json"
            git push
          else
            echo "No changes to commit."
          fi
